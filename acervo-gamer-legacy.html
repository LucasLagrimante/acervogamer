<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Acervo Gamer</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a1a;
    --card: #12122a;
    --border: #2a2a5a;
    --accent: #ff3c6e;
    --accent2: #00e5ff;
    --accent3: #ffe600;
    --text: #e8e8f8;
    --muted: #7070aa;
    --star-on: #ffe600;
    --star-off: #2a2a5a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 50px;
    animation: fadeDown 0.8s ease both;
  }

  .header-tag {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--accent2);
    letter-spacing: 4px;
    margin-bottom: 16px;
    display: block;
    opacity: 0.7;
  }

  h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(18px, 4vw, 28px);
    color: var(--accent);
    text-shadow:
      0 0 20px rgba(255,60,110,0.6),
      0 0 60px rgba(255,60,110,0.2),
      4px 4px 0 #6b0028;
    line-height: 1.5;
    margin-bottom: 12px;
  }

  .header-sub {
    color: var(--muted);
    font-size: 14px;
    margin-top: 10px;
  }

  .stats-bar {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-bottom: 40px;
    flex-wrap: wrap;
    animation: fadeUp 0.8s 0.2s ease both;
  }

  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 20px;
    text-align: center;
    min-width: 110px;
  }

  .stat-value {
    font-family: 'Press Start 2P', monospace;
    font-size: 20px;
    color: var(--accent2);
    display: block;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 30px;
    flex-wrap: wrap;
    animation: fadeUp 0.8s 0.3s ease both;
  }

  .btn-add {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 12px 20px;
    cursor: pointer;
    border-radius: 4px;
    box-shadow: 0 4px 0 #6b0028;
    transition: all 0.1s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .btn-add:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #6b0028; }
  .btn-add:active { transform: translateY(2px); box-shadow: 0 2px 0 #6b0028; }

  .search-box {
    flex: 1;
    min-width: 200px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box:focus { border-color: var(--accent2); }
  .search-box::placeholder { color: var(--muted); }

  .filter-select {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    padding: 12px 14px;
    outline: none;
    cursor: pointer;
  }

  .pagination {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 30px;
    flex-wrap: wrap;
  }

  .pagination button {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    transition: all 0.15s;
  }

  .pagination button:hover {
    background: var(--border);
    border-color: var(--accent2);
    color: var(--accent2);
  }

  .pagination button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 0 10px rgba(255,60,110,0.4);
  }

  .pagination button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .pagination-info {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 15px;
  }

  #game-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .game-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0;
    display: grid;
    grid-template-columns: 140px 1fr auto;
    gap: 16px;
    align-items: start;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.4s ease both;
    position: relative;
    overflow: hidden;
  }

  .game-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--accent);
    border-radius: 4px 0 0 4px;
    z-index: 1;
  }

  .game-card:hover {
    border-color: var(--accent2);
    transform: translateX(4px);
    box-shadow: -4px 0 20px rgba(0,229,255,0.1);
  }

  .game-cover {
    width: 140px;
    height: 200px;
    border-radius: 0 8px 8px 0;
    overflow: hidden;
    flex-shrink: 0;
    background: linear-gradient(135deg, rgba(255,60,110,0.1), rgba(0,229,255,0.1));
    border-right: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    grid-row: 1 / span 2;
  }

  .game-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .game-main { grid-column: 2; padding: 20px 24px 20px 0; }

  .game-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.6;
  }

  .game-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
  }

  .tag {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .tag-platform { background: rgba(0,229,255,0.12); color: var(--accent2); border: 1px solid rgba(0,229,255,0.25); }
  .tag-genre    { background: rgba(255,230,0,0.10); color: var(--accent3); border: 1px solid rgba(255,230,0,0.2); }
  .tag-year     { background: rgba(255,60,110,0.10); color: var(--accent); border: 1px solid rgba(255,60,110,0.2); }

  .game-comment {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  .game-actions {
    padding-right: 20px;
  }

  .stars {
    display: flex;
    gap: 4px;
    margin-bottom: 10px;
    justify-content: flex-end;
  }

  .star {
    font-size: 16px;
    color: var(--star-off);
    cursor: pointer;
    transition: color 0.1s, transform 0.1s;
  }

  .star.on {
    color: var(--star-on);
    transform: scale(1.2);
  }

  .card-btn-row {
    display: flex;
    gap: 8px;
  }

  .btn-edit, .btn-del {
    font-size: 11px;
    padding: 8px 12px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-edit {
    background: rgba(0,229,255,0.15);
    color: var(--accent2);
    border: 1px solid var(--accent2);
  }

  .btn-edit:hover { background: rgba(0,229,255,0.25); }

  .btn-del {
    background: rgba(255,60,110,0.15);
    color: var(--accent);
    border: 1px solid var(--accent);
  }

  .btn-del:hover { background: rgba(255,60,110,0.25); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .pixel-icon {
    font-size: 48px;
    display: block;
    margin-bottom: 20px;
  }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    backdrop-filter: blur(2px);
  }

  .modal-overlay.hidden { display: none; }

  .modal {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 30px;
    max-width: 500px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    animation: fadeUp 0.3s ease;
  }

  .modal h2 {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: var(--accent);
    margin-bottom: 20px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    font-size: 12px;
    color: var(--text);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--accent2); }

  .form-group textarea { resize: vertical; min-height: 70px; }

  .star-picker {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }

  .star-pick {
    font-size: 26px;
    cursor: pointer;
    color: var(--star-off);
    transition: color 0.15s, transform 0.1s;
    line-height: 1;
  }

  .star-pick:hover,
  .star-pick.on { color: var(--star-on); transform: scale(1.2); }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 24px;
  }

  .btn-save {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 12px 20px;
    cursor: pointer;
    border-radius: 4px;
    box-shadow: 0 3px 0 #6b0028;
    transition: all 0.1s;
  }

  .btn-save:hover { transform: translateY(-1px); }
  .btn-save:active { transform: translateY(2px); box-shadow: none; }

  .btn-cancel {
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 12px 20px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
  }

  .btn-cancel:hover { color: var(--text); border-color: var(--text); }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="container">

  <header>
    <span class="header-tag">// SAVE FILE LOADED //</span>
    <h1>MEU ACERVO<br>GAMER</h1>
    <p class="header-sub">Jogos que marcaram minha vida</p>
  </header>

  <div class="stats-bar" id="stats-bar">
    <div class="stat"><span class="stat-value" id="stat-total">0</span><span class="stat-label">Jogos</span></div>
    <div class="stat"><span class="stat-value" id="stat-avg">—</span><span class="stat-label">Nota Média</span></div>
    <div class="stat"><span class="stat-value" id="stat-platforms">0</span><span class="stat-label">Plataformas</span></div>
  </div>

  <div class="controls">
    <button class="btn-add" onclick="openModal()">+ ADD JOGO</button>
    <input type="text" class="search-box" placeholder="Buscar jogo..." id="search-input" oninput="renderList()">
    <select class="filter-select" id="filter-platform" onchange="renderList()">
      <option value="">Todas plataformas</option>
    </select>
    <select class="filter-select" id="filter-year" onchange="renderList()">
      <option value="">Todos anos</option>
    </select>
  </div>

  <div id="game-list"></div>
  <div class="pagination-info" id="pagination-info"></div>
  <div class="pagination" id="pagination"></div>
</div>

<!-- Modal -->
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title">NOVO JOGO</h2>
    <div class="form-group">
      <label>Título *</label>
      <input type="text" id="f-title" placeholder="Ex: Ford Racing 3">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Plataforma</label>
        <input type="text" id="f-platform" placeholder="Ex: PC, PS2, SNES">
      </div>
      <div class="form-group">
        <label>Ano que jogou</label>
        <input type="text" id="f-year" placeholder="Ex: 2005">
      </div>
    </div>
    <div class="form-group">
      <label>Gênero</label>
      <input type="text" id="f-genre" placeholder="Ex: Corrida, Plataforma, RPG">
    </div>
    <div class="form-group">
      <label>Nota (1–5)</label>
      <div class="star-picker" id="star-picker">
        <span class="star-pick" data-val="1">★</span>
        <span class="star-pick" data-val="2">★</span>
        <span class="star-pick" data-val="3">★</span>
        <span class="star-pick" data-val="4">★</span>
        <span class="star-pick" data-val="5">★</span>
      </div>
    </div>
    <div class="form-group">
      <label>Comentário / Memória</label>
      <textarea id="f-comment" placeholder="O que esse jogo significa pra você?"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveGame()">SALVAR ►</button>
    </div>
  </div>
</div>

  // Gerar covers para todos os jogos
  games.forEach(game => {
    game.cover = createSVGCover(game.id);
  });

  let editingId = null;
  let selectedRating = 0;
  let currentPage = 1;
  const itemsPerPage = 5;

  function nextId() {
    return games.length ? Math.max(...games.map(g => g.id)) + 1 : 1;
  }

  function renderList() {
    const search = document.getElementById('search-input').value.toLowerCase();
    const filterPlatform = document.getElementById('filter-platform').value;
    const filterYear = document.getElementById('filter-year').value;
    const list = document.getElementById('game-list');

    let filtered = games.filter(g => {
      const matchSearch = !search || g.title.toLowerCase().includes(search) || (g.comment||'').toLowerCase().includes(search);
      const matchPlatform = !filterPlatform || g.platform === filterPlatform;
      const matchYear = !filterYear || g.year === filterYear;
      return matchSearch && matchPlatform && matchYear;
    });

    // Se mudou o filtro, voltar para página 1
    if (filtered.length > 0 && (currentPage - 1) * itemsPerPage >= filtered.length) {
      currentPage = 1;
    }

    if (!filtered.length) {
      list.innerHTML = `<div class="empty-state"><span class="pixel-icon">👾</span><p>Nenhum jogo encontrado.<br>Adicione seu primeiro jogo!</p></div>`;
      document.getElementById('pagination-info').innerHTML = '';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    // Calcular paginação
    const totalPages = Math.ceil(filtered.length / itemsPerPage);
    const startIdx = (currentPage - 1) * itemsPerPage;
    const endIdx = startIdx + itemsPerPage;
    const pageGames = filtered.slice(startIdx, endIdx);

    // Renderizar jogos da página
    list.innerHTML = pageGames.map((g, i) => `
      <div class="game-card" style="animation-delay:${i * 0.06}s">
        <div class="game-cover">
          <img src="${g.cover}" alt="${g.title}" onerror="this.parentElement.innerHTML='📦'">
        </div>
        <div class="game-main">
          <div class="game-title">${g.title}</div>
          <div class="game-meta">
            ${g.platform ? `<span class="tag tag-platform">${g.platform}</span>` : ''}
            ${g.year     ? `<span class="tag tag-year">${g.year}</span>` : ''}
            ${g.genre    ? `<span class="tag tag-genre">${g.genre}</span>` : ''}
          </div>
          ${g.comment ? `<div class="game-comment">${g.comment}</div>` : ''}
        </div>
        <div class="game-actions">
          <div class="stars">${renderStars(g.rating)}</div>
          <div class="card-btn-row">
            <button class="btn-edit" onclick="editGame(${g.id})">Editar</button>
            <button class="btn-del"  onclick="deleteGame(${g.id})">✕</button>
          </div>
        </div>
      </div>
    `).join('');

    // Informação de paginação
    const infoText = `Mostrando ${startIdx + 1}-${Math.min(endIdx, filtered.length)} de ${filtered.length} jogos`;
    document.getElementById('pagination-info').innerHTML = infoText;

    // Renderizar botões de paginação
    let paginationHTML = '';
    
    // Botão anterior
    if (currentPage > 1) {
      paginationHTML += `<button class="pagination-btn" onclick="window.goToPage(${currentPage - 1})">← Anterior</button>`;
    }
    
    // Botões de páginas
    for (let i = 1; i <= totalPages; i++) {
      const isActive = i === currentPage ? 'active' : '';
      paginationHTML += `<button class="pagination-btn ${isActive}" onclick="window.goToPage(${i})">${i}</button>`;
    }
    
    // Botão próxima
    if (currentPage < totalPages) {
      paginationHTML += `<button class="pagination-btn" onclick="window.goToPage(${currentPage + 1})">Próxima →</button>`;
    }
    
    document.getElementById('pagination').innerHTML = paginationHTML;

    updateStats();
    updatePlatformFilter();
    updateYearFilter();
  }

  function renderStars(rating) {
    return [1,2,3,4,5].map(i => `<span class="star ${i <= rating ? 'on' : ''}">★</span>`).join('');
  }

  function updateStats() {
    document.getElementById('stat-total').textContent = games.length;
    const rated = games.filter(g => g.rating > 0);
    const avg = rated.length ? (rated.reduce((a,g) => a + g.rating, 0) / rated.length).toFixed(1) : '—';
    document.getElementById('stat-avg').textContent = avg;
    const platforms = new Set(games.map(g => g.platform).filter(Boolean));
    document.getElementById('stat-platforms').textContent = platforms.size;
  }

  function updatePlatformFilter() {
    const sel = document.getElementById('filter-platform');
    const current = sel.value;
    const platforms = [...new Set(games.map(g => g.platform).filter(Boolean))].sort();
    sel.innerHTML = `<option value="">Todas plataformas</option>` +
      platforms.map(p => `<option value="${p}" ${p===current?'selected':''}>${p}</option>`).join('');
  }

  function updateYearFilter() {
    const sel = document.getElementById('filter-year');
    const current = sel.value;
    const years = [...new Set(games.map(g => g.year).filter(Boolean))].sort((a, b) => {
      // Ordenar anos numericamente, mas deixar "Anos 90" etc no final
      const aNum = parseInt(a);
      const bNum = parseInt(b);
      if (isNaN(aNum) && isNaN(bNum)) return a.localeCompare(b);
      if (isNaN(aNum)) return 1;
      if (isNaN(bNum)) return -1;
      return aNum - bNum;
    });
    sel.innerHTML = `<option value="">Todos anos</option>` +
      years.map(y => `<option value="${y}" ${y===current?'selected':''}>${y}</option>`).join('');
  }

  function openModal(game = null) {
    editingId = game ? game.id : null;
    document.getElementById('modal-title').textContent = game ? 'EDITAR JOGO' : 'NOVO JOGO';
    document.getElementById('f-title').value    = game?.title    || '';
    document.getElementById('f-platform').value = game?.platform || '';
    document.getElementById('f-year').value     = game?.year     || '';
    document.getElementById('f-genre').value    = game?.genre    || '';
    document.getElementById('f-comment').value  = game?.comment  || '';
    selectedRating = game?.rating || 0;
    updateStarPicker();
    document.getElementById('modal-overlay').classList.remove('hidden');
    document.getElementById('f-title').focus();
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.add('hidden');
    editingId = null;
  }

  function saveGame() {
    const title = document.getElementById('f-title').value.trim();
    if (!title) { document.getElementById('f-title').focus(); return; }

    const game = {
      id: editingId || nextId(),
      title,
      platform: document.getElementById('f-platform').value.trim(),
      year:     document.getElementById('f-year').value.trim(),
      genre:    document.getElementById('f-genre').value.trim(),
      rating:   selectedRating,
      comment:  document.getElementById('f-comment').value.trim(),
      cover:    editingId ? games.find(g => g.id === editingId).cover : createSVGCover(nextId())
    };

    if (editingId) {
      const idx = games.findIndex(g => g.id === editingId);
      games[idx] = game;
    } else {
      games.push(game);
    }

    closeModal();
    renderList();
  }

  function editGame(id) {
    openModal(games.find(g => g.id === id));
  }

  function deleteGame(id) {
    if (confirm('Remover esse jogo do acervo?')) {
      games = games.filter(g => g.id !== id);
      renderList();
    }
  }

  function goToPage(page) {
    currentPage = page;
    renderList();
    document.getElementById('game-list').scrollIntoView({ behavior: 'smooth' });
  }

  // Expor globalmente
  window.goToPage = goToPage;

  document.getElementById('star-picker').addEventListener('click', e => {
    const s = e.target.closest('.star-pick');
    if (!s) return;
    selectedRating = parseInt(s.dataset.val);
    updateStarPicker();
  });

  function updateStarPicker() {
    document.querySelectorAll('.star-pick').forEach(s => {
      s.classList.toggle('on', parseInt(s.dataset.val) <= selectedRating);
    });
  }

  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter' && !document.getElementById('modal-overlay').classList.contains('hidden')) saveGame();
  });

  renderList();
</script>
</body>
</html>
